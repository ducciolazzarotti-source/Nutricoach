<!-- Storage API (localStorage) -->
<script>
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem('nc:' + key);
    if (v === null) throw new Error('not found');
    return { key, value: v };
  },
  set: async (key, value) => {
    localStorage.setItem('nc:' + key, typeof value === 'string' ? value : JSON.stringify(value));
    return { key, value };
  },
  delete: async (key) => { localStorage.removeItem('nc:' + key); return { key, deleted: true }; },
  list: async (prefix) => {
    const keys = Object.keys(localStorage).filter(k => k.startsWith('nc:'+(prefix||''))).map(k=>k.slice(3));
    return { keys };
  }
};
</script>

<!-- Install prompt handler -->
<script>
var _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _deferredPrompt = e;
  document.getElementById('install-banner').classList.remove('hidden');
});
document.getElementById('btn-install').addEventListener('click', function() {
  if (_deferredPrompt) {
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(function(r) {
      _deferredPrompt = null;
      document.getElementById('install-banner').classList.add('hidden');
    });
  }
});
window.addEventListener('appinstalled', function() {
  document.getElementById('install-banner').classList.add('hidden');
});
</script>

      { slot:"cena", main:"Polpo menta e limone 150g 🩸 · Cavolfiore 200g ⭐ · Insalata · Olio EVO 10g", alt:"Sgombro 200g 🩸 · Salmone 200g 🩸\n⚠️ No pane" },

      { slot:"merenda", main:"Yogurt greco 0% 170g", alt:"Solo yogurt" },

const TIPS = [
  { icon:"👁", title:"Porzioni a occhio", color:"#c8a96e", items:["Carne/pesce = 1 palmo (~150g)","Pasta/riso secchi = pugno chiuso (~75g)","Verdure cotte = 2 pugni (~200g)","Olio EVO = 2 cucchiai (~20g)","Frutta = 1 pugno (~130g)","Semi = 1 cucchiaio (~15g)"] },
  { icon:"🍫", title:"Dolci pianificati (max 2×/sett)", color:"#f0d060", items:["Fondente ≥70%: 2-3 quadratini dopo cena","Barbell Bar 50: venerdì sera","Gelato alla frutta: ogni 2 settimane","Tiramisù al ristorante: solo a pranzo","Pizza: venerdì/sabato, colazione normale quel giorno","Pavesini: ottimi da soli (95 kcal) o con ricotta"] },
  { icon:"🧠", title:"Flessibilità mentale", color:"#6ab0d4", items:["Un pasto fuori piano non compromette niente","Non recuperare le calorie saltando altri pasti","Il prossimo pasto ricomincia — non il lunedì","Bilancia 1×/sett domenica mattina a digiuno","Oscillazioni ±1.5 kg giornalieri sono normali","WOD pesante? +1 uovo o +100g yogurt greco dopo cena"] },
  { icon:"⚠️", title:"Regole cliniche", color:"#ff9999", items:["Zero sale aggiunto (iperaldosteronismo)","Tonno SOLO al naturale — mai sott'olio","Fesa tacchino: sodio <100mg/100g in etichetta","No noci, no mandorle (allergie)","Ferro eme + vitamina C ad ogni pasto 🩸⭐","3L acqua giorni allenamento · 2L domenica"] },
];

// ─── TARGET ───────────────────────────────────────────────────────────────────
const TARGETS = { training: { kcal:2450, p:200, c:220, g:82 }, rest: { kcal:1900, p:200, c:120, g:65 } };
const getTodayType = () => new Date().getDay() === 0 ? "rest" : "training";
const getTodayKey  = () => new Date().toISOString().split("T")[0];
const getDateKey   = (d) => d.toISOString().split("T")[0];
const pct = (v, max) => Math.min(100, Math.round((v/max)*100));
const emptyMeals = () => Object.fromEntries(MEAL_SLOTS.map(s => [s.id, []]));
const getDayType = (dateObj) => dateObj.getDay() === 0 ? "rest" : "training";

// Genera array dei giorni del mese corrente
const getMonthDays = (year, month) => {
  const days = [];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for(let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, month, d);
    days.push({ date, key: getDateKey(date), dayOfWeek: date.getDay(), type: getDayType(date) });
  }
  return days;
};

// ─── APP ──────────────────────────────────────────────────────────────────────
function NutriCoach() {
  const today = new Date();
  const [tab,          setTab]          = useState("log");
  const [selectedDate, setSelectedDate] = useState(today);
  const [dayType,      setDayType]      = useState(getTodayType());
  const [meals,        setMeals]        = useState(emptyMeals());
  const [monthlyData,  setMonthlyData]  = useState({});  // { "2026-03-17": {kcal,p,c,g,items} }
  const [activeMeal,   setActiveMeal]   = useState("colazione");
  const [foodInput,    setFoodInput]    = useState("");
  const [foodQty,      setFoodQty]      = useState("");
  const [suggestions,  setSuggestions]  = useState([]);
  const [selectedFood, setSelectedFood] = useState(null);
  const [aiLoading,    setAiLoading]    = useState(false);
  const [messages,     setMessages]     = useState([{ role:"assistant", content:"Ciao Duccio! 👋 Sono il tuo nutrizionista.\n\nOggi è " + (getTodayType() === "rest" ? "domenica — LOW CARB 🔥 (1900 kcal)" : "giorno di allenamento 🏋️ (2450 kcal)") + ".\n\nRegistra i pasti nel Diario o chiedimi qualsiasi cosa sul piano." }]);
  const [chatInput,    setChatInput]    = useState("");
  const [chatLoading,  setChatLoading]  = useState(false);
  const [ready,        setReady]        = useState(false);
  const [loadingDate,  setLoadingDate]  = useState(false);  // evita salvataggio durante il caricamento
  const [planDay,      setPlanDay]      = useState(new Date().getDay() === 0 ? 6 : new Date().getDay()-1);
  const [openTip,      setOpenTip]      = useState(null);
  const [showAlt,      setShowAlt]      = useState({});
  const [histMonth,    setHistMonth]    = useState({ year: today.getFullYear(), month: today.getMonth() });
  const messagesEnd = useRef(null);

  const isToday = getDateKey(selectedDate) === getTodayKey();
  const selectedDateType = getDayType(selectedDate);
  const target = TARGETS[isToday ? dayType : selectedDateType];
  const selectedKey = getDateKey(selectedDate);

  // ─── STORAGE: carica al primo avvio ─────────────────────────────────────
  useEffect(() => {
    setLoadingDate(true);
    (async () => {
      // Carica pasti di oggi
      try {
        const s = await window.storage.get("meals:"+getTodayKey());
        if (s) setMeals(JSON.parse(s.value));
      } catch(e) {}
      // Carica chat
      try {
        const s = await window.storage.get("chat3:hist");
        if (s) { const p=JSON.parse(s.value); if(p.length>0) setMessages(p); }
      } catch(e) {}
      // Carica tipo giornata
      try {
        const s = await window.storage.get("daytype:manual");
        if (s) { const {type,date}=JSON.parse(s.value); if(date===getTodayKey()) setDayType(type); }
      } catch(e) {}
      // Carica piano del giorno
      try {
        const s = await window.storage.get("planday:last");
        if (s) { const {day,date}=JSON.parse(s.value); if(date===getTodayKey()) setPlanDay(day); }
      } catch(e) {}
      // Carica storico mensile (ultimi 60 giorni)
      try {
        const s = await window.storage.get("monthly:summary");
        if (s) setMonthlyData(JSON.parse(s.value));
      } catch(e) {}
      setReady(true);
      setTimeout(() => setLoadingDate(false), 50);
    })();
  }, []);

  // Quando si cambia data selezionata, carica i pasti di quel giorno
  useEffect(() => {
    if (!ready) return;
    setLoadingDate(true);
    (async () => {
      try {
        const s = await window.storage.get("meals:"+selectedKey);
        setMeals(s ? JSON.parse(s.value) : emptyMeals());
      } catch(e) { setMeals(emptyMeals()); }
      // Piccolo delay per assicurarsi che setMeals sia completato prima di riabilitare il salvataggio
      setTimeout(() => setLoadingDate(false), 50);
    })();
  }, [selectedKey, ready]);

  // ─── STORAGE: salva ad ogni modifica ─────────────────────────────────────
  useEffect(() => {
    if (!ready || loadingDate) return;  // non salvare durante il caricamento
    window.storage.set("meals:"+selectedKey, JSON.stringify(meals)).catch(()=>{});
    // Aggiorna summary mensile
    const allI = Object.values(meals).flat();
    const tot = allI.reduce((a,i)=>({kcal:a.kcal+i.kcal,p:a.p+i.p,c:a.c+i.c,g:a.g+i.g}),{kcal:0,p:0,c:0,g:0});
    const totalItems = allI.length;
    if (totalItems > 0 || monthlyData[selectedKey]) {
      const newMonthly = { ...monthlyData, [selectedKey]: { kcal:Math.round(tot.kcal), p:Math.round(tot.p), c:Math.round(tot.c), g:Math.round(tot.g), items:totalItems, type:selectedDateType } };
      setMonthlyData(newMonthly);
      window.storage.set("monthly:summary", JSON.stringify(newMonthly)).catch(()=>{});
    }
  }, [meals, ready, loadingDate]);

  useEffect(() => { if(!ready||messages.length<=1) return; window.storage.set("chat3:hist", JSON.stringify(messages.slice(-30))).catch(()=>{}); }, [messages, ready]);
  useEffect(() => { if(!ready) return; window.storage.set("daytype:manual", JSON.stringify({type:dayType, date:getTodayKey()})).catch(()=>{}); }, [dayType, ready]);
  useEffect(() => { if(!ready) return; window.storage.set("planday:last", JSON.stringify({day:planDay, date:getTodayKey()})).catch(()=>{}); }, [planDay, ready]);
  useEffect(() => { messagesEnd.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);

  // Totals
  const allItems = Object.values(meals).flat();
  const totals   = allItems.reduce((a,i) => ({kcal:a.kcal+i.kcal, p:a.p+i.p, c:a.c+i.c, g:a.g+i.g}), {kcal:0,p:0,c:0,g:0});
  const mealTot  = (id) => (meals[id]||[]).reduce((a,i)=>({kcal:a.kcal+i.kcal,p:a.p+i.p,c:a.c+i.c,g:a.g+i.g}),{kcal:0,p:0,c:0,g:0});

  // Naviga giorno precedente/successivo
  const goDay = (delta) => {
    const d = new Date(selectedDate);
    d.setDate(d.getDate() + delta);
    if (d <= today) setSelectedDate(d);
  };
  const monthDays = getMonthDays(histMonth.year, histMonth.month);

  // Food search
  const handleSearch = (val) => {
    setFoodInput(val); setSelectedFood(null);
    if(val.length<2){setSuggestions([]);return;}
    setSuggestions(Object.keys(DB).filter(k=>k.includes(val.toLowerCase())).slice(0,6));
  };
  const pickFood = (name) => { setSelectedFood(name); setFoodInput(name); setSuggestions([]); };

  const addFood = async () => {
    const qty = parseFloat(foodQty);
    if((!selectedFood&&!foodInput.trim())||!qty||qty<=0) return;
    const name = selectedFood||foodInput.trim();
    const dbKey = Object.keys(DB).find(k=>k.toLowerCase().includes(name.toLowerCase()));
    const newItem = (macros) => ({ id:Date.now(), name, qty, ...macros, time:new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}) });
    if(dbKey){
      const f=DB[dbKey], r=qty/100;
      setMeals(prev=>{
        const updated = {...prev,[activeMeal]:[...prev[activeMeal], newItem({kcal:Math.round(f.kcal*r), p:Math.round(f.p*r*10)/10, c:Math.round(f.c*r*10)/10, g:Math.round(f.g*r*10)/10})]};
        window.storage.set("meals:"+selectedKey, JSON.stringify(updated)).catch(()=>{});
        return updated;
      });
    } else {
      setAiLoading(true);
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"Rispondi SOLO con JSON. Formato: {\"kcal\":120,\"p\":15,\"c\":5,\"g\":3}. Valori per la quantità specificata.",messages:[{role:"user",content:`${qty}g di "${name}"`}]})});
        const data=await res.json();
        const macros=JSON.parse(data.content[0].text.replace(/```json|```/g,"").trim());
        setMeals(prev=>{
          const updated={...prev,[activeMeal]:[...prev[activeMeal], newItem({kcal:Math.round(macros.kcal||0),p:Math.round((macros.p||0)*10)/10,c:Math.round((macros.c||0)*10)/10,g:Math.round((macros.g||0)*10)/10,ai:true})]};
          window.storage.set("meals:"+selectedKey, JSON.stringify(updated)).catch(()=>{});
          return updated;
        });
      } catch(e){
        setMeals(prev=>{
          const updated={...prev,[activeMeal]:[...prev[activeMeal], newItem({kcal:0,p:0,c:0,g:0,error:true})]};
          window.storage.set("meals:"+selectedKey, JSON.stringify(updated)).catch(()=>{});
          return updated;
        });
      }
      setAiLoading(false);
    }
    setFoodInput(""); setFoodQty(""); setSelectedFood(null);
  };

  // Salvataggio diretto — backup per garantire persistenza
  const saveNow = (currentMeals) => {
    window.storage.set("meals:"+selectedKey, JSON.stringify(currentMeals)).catch(()=>{});
  };

  const removeItem = (mealId, itemId) => setMeals(prev=>{
    const updated = {...prev,[mealId]:prev[mealId].filter(i=>i.id!==itemId)};
    window.storage.set("meals:"+selectedKey, JSON.stringify(updated)).catch(()=>{});
    return updated;
  });

  // Chat
  const sendChat = async () => {
    if(!chatInput.trim()||chatLoading) return;
    const um={role:"user",content:chatInput.trim()};
    const newMsgs=[...messages,um]; setMessages(newMsgs); setChatInput(""); setChatLoading(true);
    const ctx = allItems.length>0
      ? `\n\nDIARIO OGGI:\n${MEAL_SLOTS.map(s=>meals[s.id].length>0?`${s.label}: ${meals[s.id].map(i=>`${i.qty}g ${i.name}(${i.kcal}kcal)`).join(", ")}`:null).filter(Boolean).join("\n")}\nTotale: ${Math.round(totals.kcal)}kcal P:${Math.round(totals.p)}g C:${Math.round(totals.c)}g G:${Math.round(totals.g)}g | Target: ${target.kcal}kcal | Rimasto: ${target.kcal-Math.round(totals.kcal)}kcal`:"";
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT+ctx,messages:newMsgs.slice(-10).map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      setMessages(prev=>[...prev,{role:"assistant",content:data.content[0].text}]);
    } catch(e){ setMessages(prev=>[...prev,{role:"assistant",content:"Errore di connessione. Riprova."}]); }
    setChatLoading(false);
  };

  const activeMealSlot = MEAL_SLOTS.find(s=>s.id===activeMeal);
  const planDayData    = DAYS_PLAN[planDay];

  // ─── COLORI SFONDO TAB ───────────────────────────────────────────────────────
  const tabBg = (id) => tab===id ? "#e07b5a" : "none";
  const tabCol= (id) => tab===id ? "#fff" : "#555";

  return (
    <div style={{fontFamily:"'Georgia',serif",minHeight:"100vh",background:"#0b0b0b",color:"#f0ede6",display:"flex",flexDirection:"column",maxWidth:700,margin:"0 auto"}}>

      {/* ── HEADER ── */}
      <div style={{background:"linear-gradient(135deg,#181818,#2a1500)",borderBottom:"1px solid #2a2a2a",padding:"11px 14px 10px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
          <div>
            <p style={{fontSize:8,letterSpacing:3,color:"#e07b5a",textTransform:"uppercase",margin:"0 0 1px",fontFamily:"system-ui"}}>NutriCoach · Duccio</p>
            <h1 style={{fontSize:15,fontWeight:700,margin:0}}>Piano Nutrizionale AI</h1>
          </div>
          <button onClick={()=>setDayType(d=>d==="training"?"rest":"training")} style={{background:dayType==="training"?"#2a0800":"#0a1a0a",border:`1px solid ${dayType==="training"?"#e07b5a44":"#7aab8a44"}`,borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:10,fontFamily:"system-ui",color:dayType==="training"?"#e07b5a":"#7aab8a"}}>
            {dayType==="training"?"🏋️ Allenamento":"🔥 Riposo"}
          </button>
        </div>
        {/* Macro bar */}
        <div style={{display:"flex",gap:7}}>
          {[{l:"Kcal",v:Math.round(totals.kcal),max:target.kcal,c:"#e07b5a"},{l:"P",v:Math.round(totals.p),max:target.p,c:"#f0a080"},{l:"C",v:Math.round(totals.c),max:target.c,c:"#c8a96e"},{l:"G",v:Math.round(totals.g),max:target.g,c:"#7aab8a"}].map(m=>{
            const over=m.v>m.max;
            return(
              <div key={m.l} style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",fontFamily:"system-ui",fontSize:9,marginBottom:2}}>
                  <span style={{color:"#666"}}>{m.l}</span>
                  <span style={{color:over?"#ff6666":m.c}}>{m.v}/{m.max}</span>
                </div>
                <div style={{height:3,background:"#1e1e1e",borderRadius:2}}>
                  <div style={{height:"100%",width:pct(m.v,m.max)+"%",background:over?"#ff4444":m.c,borderRadius:2,transition:"width 0.3s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── TABS ── */}
      <div style={{background:"#111",borderBottom:"1px solid #1a1a1a",position:"sticky",top:80,zIndex:9}}>
        <div style={{display:"flex"}}>
          {[{id:"log",l:"🍽️ Diario"},{id:"storico",l:"📅 Storico"},{id:"piano",l:"📋 Piano"},{id:"consigli",l:"💡 Consigli"},{id:"chat",l:"💬 AI"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 6px",border:"none",borderBottom:tab===t.id?"2px solid #e07b5a":"2px solid transparent",background:"none",color:tab===t.id?"#e07b5a":"#555",cursor:"pointer",fontSize:11,fontFamily:"system-ui",fontWeight:tab===t.id?700:400}}>{t.l}</button>
          ))}
        </div>
      </div>

      {/* ═══ TAB: DIARIO ══════════════════════════════════════════════════════ */}
      {tab==="log" && (
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          {/* Navigatore data */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px 6px",background:"#141414",borderBottom:"1px solid #1a1a1a"}}>
            <button onClick={()=>goDay(-1)} style={{background:"none",border:"1px solid #2a2a2a",borderRadius:7,padding:"5px 10px",color:"#888",cursor:"pointer",fontSize:13}}>‹</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,color:isToday?"#e07b5a":"#ccc"}}>
                {isToday?"Oggi — ":""}{selectedDate.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}
              </div>
              <div style={{fontSize:10,fontFamily:"system-ui",color:isToday?(dayType==="training"?"#e07b5a":"#7aab8a"):(selectedDateType==="training"?"#e07b5a":"#7aab8a")}}>
                {(isToday?dayType:selectedDateType)==="training"?"🏋️ Allenamento — 2450 kcal":"🔥 Low Carb — 1900 kcal"}
              </div>
            </div>
            <button onClick={()=>goDay(1)} disabled={isToday} style={{background:"none",border:"1px solid #2a2a2a",borderRadius:7,padding:"5px 10px",color:isToday?"#2a2a2a":"#888",cursor:isToday?"default":"pointer",fontSize:13}}>›</button>
          </div>

          {/* Meal selector */}
          <div style={{padding:"10px 12px 0",overflowX:"auto"}}>
            <div style={{display:"flex",gap:5,paddingBottom:2}}>
              {MEAL_SLOTS.map(s=>{
                const mt=mealTot(s.id), isActive=activeMeal===s.id, hasItems=meals[s.id].length>0;
                return(
                  <button key={s.id} onClick={()=>setActiveMeal(s.id)} style={{flexShrink:0,padding:"7px 9px",borderRadius:10,border:isActive?`2px solid ${s.color}`:"1px solid #1e1e1e",background:isActive?`${s.color}18`:"#141414",cursor:"pointer",minWidth:74,position:"relative",transition:"all 0.15s"}}>
                    {hasItems&&<div style={{position:"absolute",top:3,right:3,width:5,height:5,borderRadius:"50%",background:s.color}}/>}
                    <div style={{fontSize:15}}>{s.icon}</div>
                    <div style={{fontSize:8,fontFamily:"system-ui",color:isActive?s.color:"#444",fontWeight:isActive?700:400,marginTop:2,lineHeight:1.3}}>{s.label}</div>
                    {hasItems&&<div style={{fontSize:8,fontFamily:"system-ui",color:s.color,marginTop:1}}>{Math.round(mt.kcal)} kcal</div>}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Add food */}
          <div style={{margin:"10px 12px 0",background:"#181818",border:`1px solid ${activeMealSlot.color}33`,borderRadius:12,padding:"11px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
              <span style={{fontSize:15}}>{activeMealSlot.icon}</span>
              <div>
                <span style={{fontSize:12,fontWeight:700,color:activeMealSlot.color}}>{activeMealSlot.label}</span>
                <div style={{fontSize:9,color:"#555",fontFamily:"system-ui"}}>{activeMealSlot.time}{activeMealSlot.note?` · ${activeMealSlot.note}`:""}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:7}}>
              <div style={{flex:1,position:"relative"}}>
                <input value={foodInput} onChange={e=>handleSearch(e.target.value)} placeholder="Aggiungi alimento..." style={{width:"100%",background:"#111",border:"1px solid #252525",borderRadius:8,padding:"8px 11px",color:"#f0ede6",fontSize:12,fontFamily:"system-ui",outline:"none",boxSizing:"border-box"}}/>
                {suggestions.length>0&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:8,zIndex:20,overflow:"hidden",marginTop:2}}>
                    {suggestions.map(s=>(
                      <button key={s} onClick={()=>pickFood(s)} style={{width:"100%",textAlign:"left",padding:"7px 11px",background:"none",border:"none",color:"#ccc",fontSize:11,fontFamily:"system-ui",cursor:"pointer",borderBottom:"1px solid #1a1a1a"}}>
                        {s} <span style={{color:"#444",fontSize:10}}>{DB[s].kcal} kcal/100g</span>
                      </button>

                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                    <div style={{width:19,height:19,borderRadius:"50%",background:"#e07b5a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>🥗</div>
                    <span style={{fontSize:8,color:"#555",fontFamily:"system-ui"}}>Nutrizionista</span>
                  </div>
                )}
                <div style={{maxWidth:"88%",background:m.role==="user"?"#2a1500":"#181818",border:m.role==="user"?"1px solid #e07b5a33":"1px solid #1e1e1e",borderRadius:m.role==="user"?"11px 11px 4px 11px":"4px 11px 11px 11px",padding:"9px 12px",fontSize:12,fontFamily:"system-ui",lineHeight:1.7,color:m.role==="user"?"#f0d0c0":"#ddd",whiteSpace:"pre-wrap"}}>
                  {m.content}
                </div>
              </div>
            ))}
            {chatLoading&&(
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:11}}>
                <div style={{width:19,height:19,borderRadius:"50%",background:"#e07b5a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>🥗</div>
                <div style={{background:"#181818",border:"1px solid #1e1e1e",borderRadius:"4px 11px 11px 11px",padding:"9px 12px",display:"flex",gap:3}}>
                  {[0,1,2].map(j=><div key={j} style={{width:5,height:5,borderRadius:"50%",background:"#e07b5a",opacity:0.5,animation:`pulse 1.2s ${j*0.2}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={messagesEnd}/>
          </div>
          {/* Quick actions */}
          <div style={{padding:"3px 12px 5px",display:"flex",gap:5,overflowX:"auto"}}>
            {["Cosa mangio a pranzo?","Macro di oggi","Sostituto cena","Pre-WOD alternative"].map(q=>(
              <button key={q} onClick={()=>setChatInput(q)} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:18,padding:"4px 9px",fontSize:10,fontFamily:"system-ui",color:"#666",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{q}</button>
            ))}
          </div>
          {/* Input */}
          <div style={{padding:"5px 12px 13px",display:"flex",gap:7}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Scrivi al nutrizionista..." style={{flex:1,background:"#181818",border:"1px solid #252525",borderRadius:10,padding:"9px 12px",color:"#f0ede6",fontSize:12,fontFamily:"system-ui",outline:"none"}}/>
            <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()} style={{background:chatLoading||!chatInput.trim()?"#1a1a1a":"#e07b5a",border:"none",borderRadius:10,padding:"9px 14px",color:chatLoading||!chatInput.trim()?"#333":"#fff",cursor:chatLoading||!chatInput.trim()?"default":"pointer",fontSize:15}}>→</button>
          </div>
        </div>
      )}

      <style>{`
        @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
        input::placeholder{color:#2a2a2a}
        input::-webkit-inner-spin-button{-webkit-appearance:none}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}
      `}</style>
    </div>
  );
}

</script>

<!-- Render -->
<script>
window.addEventListener('load', function() {
  // Babel compiles async — wait a tick
  setTimeout(function() {
    try {
      ReactDOM.render(
        React.createElement(NutriCoach),
        document.getElementById('root')
      );
    } catch(e) {
      console.error('Render error:', e);
      document.getElementById('root').innerHTML = '<div style="padding:20px;color:#e07b5a;font-family:system-ui">Errore di caricamento. Ricarica la pagina.</div>';
    }
  }, 500);
});
</script>

</body>
</html>
